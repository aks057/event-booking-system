spring:
  application:
    name: event-booking-api

  datasource:
    url: jdbc:h2:mem:eventdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: event-booking-demo-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

server:
  port: 8080
